name: Build APK

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RE0_KEYSTORE_PATH: ${{ github.workspace }}/android/app/re0-release.jks
      RE0_KEYSTORE_PASSWORD: ${{ secrets.RE0_KEYSTORE_PASSWORD }}
      RE0_KEY_ALIAS: ${{ secrets.RE0_KEY_ALIAS }}
      RE0_KEY_PASSWORD: ${{ secrets.RE0_KEY_PASSWORD }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.8'
          channel: 'stable'

      - name: Install dependencies
        run: flutter pub get

      - name: Generate App Icons
        run: dart run flutter_launcher_icons:main

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test

      - name: Read app version
        id: app_version
        shell: bash
        run: |
          raw_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml | head -n 1)"
          version_name="${raw_version%%+*}"
          version_code="${raw_version##*+}"
          if [[ -z "${version_name}" || -z "${version_code}" || "${version_name}" == "${raw_version}" ]]; then
            echo "::error::pubspec.yaml version must use name+code format, for example 1.1.21+10121."
            exit 1
          fi
          echo "name=${version_name}" >> "${GITHUB_OUTPUT}"
          echo "code=${version_code}" >> "${GITHUB_OUTPUT}"

      - name: Configure release signing
        env:
          RE0_KEYSTORE_BASE64: ${{ secrets.RE0_KEYSTORE_BASE64 }}
        shell: bash
        run: |
          if [[ -z "${RE0_KEYSTORE_BASE64}" || -z "${RE0_KEYSTORE_PASSWORD}" || -z "${RE0_KEY_ALIAS}" || -z "${RE0_KEY_PASSWORD}" ]]; then
            echo "::error::Missing RE0 release signing secrets."
            exit 1
          fi
          echo "${RE0_KEYSTORE_BASE64}" | base64 --decode > "${RE0_KEYSTORE_PATH}"
          chmod 600 "${RE0_KEYSTORE_PATH}"

      - name: Build APK
        run: flutter build apk --release --dart-define=RE0_VERSION_NAME=${{ steps.app_version.outputs.name }} --dart-define=RE0_VERSION_CODE=${{ steps.app_version.outputs.code }} --dart-define=RE0_RELEASE_TAG=${{ github.ref_name }}

      - name: Prepare APK
        shell: bash
        run: |
          mkdir -p build/release
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            version="${GITHUB_REF_NAME}"
          else
            version="dev-${GITHUB_SHA::7}"
          fi
          cp build/app/outputs/flutter-apk/app-release.apk "build/release/RE0-${version}.apk"

      - name: Prepare release notes
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          printf '%s\n' \
            '本次更新：' \
            '' \
            '- 修正 VIP 额度倍率计算，0.5 倍率按 5 折实际扣 1 额度/张。' \
            '- 生图和改图展示 VIP 原价、折后价和折扣标签，单价更直观。' \
            '- 顶部状态卡将记忆保留与当前额度放在同一行，并跟随主题文案。' \
            '- 发布签名配置未改动。' \
            > build/release/notes.md

      - name: Prepare mobile manifest
        shell: bash
        run: |
          if [[ "${GITHUB_REF_TYPE}" == "tag" ]]; then
            apk_name="RE0-${GITHUB_REF_NAME}.apk"
          else
            apk_name="RE0-dev-${GITHUB_SHA::7}.apk"
          fi
          export APK_NAME="${apk_name}"
          export VERSION_NAME="${{ steps.app_version.outputs.name }}"
          export VERSION_CODE="${{ steps.app_version.outputs.code }}"
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path

          notes_path = Path("build/release/notes.md")
          release_notes = notes_path.read_text(encoding="utf-8").strip() if notes_path.exists() else "包含最新修复与体验优化。"
          manifest = {
              "apk_name": os.environ["APK_NAME"],
              "version_code": int(os.environ["VERSION_CODE"]),
              "version_name": os.environ["VERSION_NAME"],
              "release_notes": release_notes,
          }
          Path("build/release/manifest.json").write_text(
              json.dumps(manifest, ensure_ascii=False, indent=2) + "\n",
              encoding="utf-8",
          )
          PY

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RE0-apk
          path: |
            build/release/*.apk
            build/release/manifest.json

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          body_path: build/release/notes.md
          files: |
            build/release/*.apk
            build/release/manifest.json
